# Sonarr container
# Docker Hub: https://hub.docker.com/r/linuxserver/sonarr
# Docs: https://docs.linuxserver.io/images/docker-sonarr
---
- name: Start container
  tags:
    - sonarr
    - container
  docker_container:
    name: sonarr
    image: linuxserver/sonarr
    state: "{{ docker_state }}"
    restart: "{{ docker_restart }}"
    restart_policy: "{{ docker_restart_policy }}"
    recreate: "{{ docker_recreate }}"
    volumes:
      - "/etc/localtime:/etc/localtime:ro"
      - "{{ config_directory }}/sonarr:/config"
      - "{{ data_directory }}:/data"
    networks:
      - name: "{{ docker_network }}"
    dns_servers:
      - "{{ dns_primary }}"
      - "{{ dns_secondary }}"
    ports:
      - "{{ host_port }}:8989"
    env:
      PUID: "{{ servarr_uid }}"
      PGID: "{{ servarr_gid }}"
      TZ: "{{ timezone }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.sonarr.rule: "Host(`sonarr.home.arpa`)"
      traefik.http.routers.sonarr.entrypoints: "web"
      traefik.http.services.sonarr.loadbalancer.server.port: "8989"
      homepage.group: "Media"
      homepage.name: "Sonarr"
      homepage.icon: "sonarr.png"
      homepage.description: "Manage your TV Shows"
      homepage.href: "http://{{ network_localhost }}:{{ host_port }}"
      homepage.widget.type: sonarr
      homepage.widget.url: "http://{{ network_localhost }}:{{ host_port }}"
      homepage.widget.key: "{{ sonarr_api_key }}"
      homepage.widget.enableQueue: "false"
