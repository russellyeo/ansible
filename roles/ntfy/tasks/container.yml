# https://docs.ntfy.sh/install/#docker
---
- name: Start container
  tags:
    - ntfy
    - container
  docker_container:
    name: ntfy
    image: binwiederhier/ntfy:latest
    state: "{{ docker_state }}"
    restart: "{{ docker_restart }}"
    restart_policy: "{{ docker_restart_policy }}"
    recreate: "{{ docker_recreate }}"
    command: serve
    volumes:
      - "{{ config_directory }}/ntfy:/etc/ntfy"
      - "{{ config_directory }}/ntfy/cache:/var/cache/ntfy"
    networks:
      - name: "{{ docker_network }}"
    dns_servers:
      - "{{ dns_primary }}"
      - "{{ dns_secondary }}"
    ports:
      - "{{ host_port }}:80"
    env:
      PUID: "{{ servarr_uid }}"
      PGID: "{{ servarr_gid }}"
      TZ: "{{ timezone }}"
    labels:
      traefik.enable: "false"
      homepage.group: "Infrastructure"
      homepage.name: "Ntfy"
      homepage.icon: "ntfy.png"
      homepage.description: "Notifications"
      homepage.href: "http://{{ network_localhost }}:{{ host_port }}"
