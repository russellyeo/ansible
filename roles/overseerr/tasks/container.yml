---
- name: Start container
  tags:
    - overseerr
    - container
  docker_container:
    name: overseerr
    image: lscr.io/linuxserver/overseerr:latest
    state: "{{ docker_state }}"
    restart: "{{ docker_restart }}"
    restart_policy: "{{ docker_restart_policy }}"
    recreate: "{{ docker_recreate }}"
    volumes:
      - "{{ config_directory }}/overseerr:/config"
      - "{{ data_directory }}:/data"
    networks:
      - name: "{{ docker_network }}"
    dns_servers:
      - "{{ dns_primary }}"
      - "{{ dns_secondary }}"
    env:
      PUID: "{{ servarr_uid }}"
      PGID: "{{ servarr_gid }}"
      TZ: "{{ timezone }}"
    labels:
      traefik.enable: "true"
      traefik.http.routers.overseerr.rule: "Host(`overseerr.{{ tailnet_synology_machine }}.{{ tailnet_host }}`)"
      traefik.http.routers.overseerr.entrypoints: "websecure"
      traefik.http.routers.overseerr.tls: "true"
      traefik.http.services.overseerr.loadbalancer.server.port: "{{ host_port }}"
      homepage.group: "Media"
      homepage.name: "Overseerr"
      homepage.icon: "overseerr.png"
      homepage.description: "Request stuff"
      homepage.href: "https://overseerr.{{ tailnet_synology_machine }}.{{ tailnet_host }}"
      homepage.widget.type: overseerr
      homepage.widget.url: "http://{{ network_localhost }}:{{ host_port }}"
      homepage.widget.key: "{{ overseerr_api_key }}"
